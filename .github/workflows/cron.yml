name: Hourly Reminder Cron

on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions UI

jobs:
  trigger-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Route
        run: |
          curl -X GET "${{ secrets.PROD_URL }}/api/cron/reminders" \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               --fail
